    <!-- Consent Mode v2 — default denied antes de GTM -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }

      // Defaults: todo denied salvo security/functionality.
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied',
        'functionality_storage': 'granted',
        'security_storage': 'granted',
        'wait_for_update': 500
      });

      // Si el user ya decidió antes (localStorage), aplicar inmediatamente.
      try {
        var saved = JSON.parse(localStorage.getItem('haycancha:cookie-consent') || 'null');
        if (saved) {
          gtag('consent', 'update', {
            'analytics_storage': saved.analytics ? 'granted' : 'denied',
            'ad_storage': saved.advertising ? 'granted' : 'denied',
            'ad_user_data': saved.advertising ? 'granted' : 'denied',
            'ad_personalization': saved.advertising ? 'granted' : 'denied'
          });
        }
      } catch (e) { /* localStorage may not exist */ }
    </script>
